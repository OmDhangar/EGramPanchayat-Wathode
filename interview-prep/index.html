<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Interview Prep - EGramPanchayat Wathode</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #0a0f1a;
    --surface: #111827;
    --surface-soft: #1a2235;
    --border: #1e2d45;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --accent: #3b82f6;
    --accent-soft: rgba(59, 130, 246, 0.16);
    --radius: 12px;
  }
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  html {
    scroll-behavior: smooth;
  }
  body {
    font-family: "Inter", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  .topbar {
    position: sticky;
    top: 0;
    z-index: 10;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(10, 15, 26, 0.9);
    backdrop-filter: blur(10px);
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .title-wrap {
    flex: 1;
    min-width: 260px;
  }
  .title {
    font-size: 19px;
    font-weight: 700;
  }
  .subtitle {
    color: var(--text-muted);
    font-size: 13px;
    margin-top: 4px;
  }
  .search {
    min-width: 240px;
    flex: 0 1 320px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    color: var(--text);
    outline: none;
  }
  .search:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .layout {
    max-width: 1280px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 300px 1fr;
    gap: 20px;
    padding: 20px;
  }
  .sidebar {
    position: sticky;
    top: 86px;
    height: calc(100vh - 106px);
    overflow: auto;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    padding: 14px;
  }
  .sidebar h3 {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.7px;
    margin-bottom: 10px;
  }
  .toc a {
    display: block;
    color: var(--text-muted);
    text-decoration: none;
    font-size: 13px;
    padding: 7px 8px;
    border-radius: 8px;
    line-height: 1.45;
  }
  .toc a:hover {
    background: var(--surface-soft);
    color: var(--text);
  }
  .toc a.toc-h3 {
    padding-left: 20px;
    font-size: 12px;
  }
  .content {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    padding: 28px;
    min-height: 70vh;
  }
  .status {
    color: var(--text-muted);
    font-size: 14px;
  }
  .markdown h1,
  .markdown h2,
  .markdown h3 {
    scroll-margin-top: 96px;
    margin-top: 1.3em;
    margin-bottom: 0.55em;
    line-height: 1.3;
  }
  .markdown h1 {
    font-size: 30px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 10px;
  }
  .markdown h2 {
    font-size: 24px;
    border-bottom: 1px solid rgba(30, 45, 69, 0.65);
    padding-bottom: 8px;
  }
  .markdown h3 {
    font-size: 19px;
  }
  .markdown p,
  .markdown li {
    color: var(--text);
    opacity: 0.95;
    line-height: 1.8;
    font-size: 15px;
  }
  .markdown ul,
  .markdown ol {
    margin: 10px 0 16px 22px;
  }
  .markdown li + li {
    margin-top: 6px;
  }
  .markdown hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 22px 0;
  }
  .markdown blockquote {
    border-left: 3px solid var(--accent);
    background: var(--surface-soft);
    margin: 14px 0;
    padding: 10px 14px;
    border-radius: 8px;
    color: var(--text-muted);
  }
  .markdown pre {
    background: #0d1117;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    overflow-x: auto;
    margin: 14px 0;
  }
  .markdown code {
    font-family: "JetBrains Mono", monospace;
    font-size: 12px;
    background: #0d1117;
    border-radius: 6px;
    padding: 2px 6px;
  }
  .markdown pre code {
    padding: 0;
    background: transparent;
  }
  .markdown table {
    width: 100%;
    border-collapse: collapse;
    margin: 14px 0;
    font-size: 14px;
  }
  .markdown th,
  .markdown td {
    border: 1px solid var(--border);
    padding: 10px;
    text-align: left;
    vertical-align: top;
  }
  .markdown th {
    color: #bfdbfe;
    background: rgba(59, 130, 246, 0.12);
  }
  .hidden {
    display: none;
  }
  @media (max-width: 980px) {
    .layout {
      grid-template-columns: 1fr;
    }
    .sidebar {
      position: static;
      height: auto;
      max-height: 280px;
    }
    .content {
      padding: 20px;
    }
}
</style>
</head>
<body>
<div class="topbar">
  <div class="title-wrap">
    <div class="title">EGramPanchayat Wathode - Interview Preparation Guide</div>
    <div class="subtitle">Formatted markdown viewer with searchable sections and table of contents</div>
  </div>
  <input id="searchInput" class="search" placeholder="Search headings... e.g. JWT, S3, Razorpay" />
</div>
<div class="layout">
  <aside class="sidebar">
    <h3>Table of Contents</h3>
    <nav id="toc" class="toc">
      <p class="status">Loading sections...</p>
    </nav>
  </aside>
  <main class="content">
    <article id="markdownContainer" class="markdown">
      <p class="status">Loading interview guide...</p>
    </article>
  </main>
</div>
<script>
  const guidePath = "../interview_preparation_guide.md";
  const toc = document.getElementById("toc");
  const markdownContainer = document.getElementById("markdownContainer");
  const searchInput = document.getElementById("searchInput");

  marked.setOptions({
    gfm: true,
    breaks: false
  });

  function slugify(text) {
    return text
      .toLowerCase()
      .trim()
      .replace(/[^a-z0-9\s-]/g, "")
      .replace(/\s+/g, "-")
      .replace(/-+/g, "-");
  }

  function assignHeadingIds() {
    const used = new Map();
    const headings = markdownContainer.querySelectorAll("h1, h2, h3");
    headings.forEach((heading) => {
      const base = slugify(heading.textContent || "section");
      const count = used.get(base) || 0;
      used.set(base, count + 1);
      heading.id = count > 0 ? `${base}-${count}` : base;
    });
    return headings;
  }

  function buildToc(headings) {
    if (!headings.length) {
      toc.innerHTML = "<p class='status'>No headings found.</p>";
      return;
    }
    toc.innerHTML = "";
    headings.forEach((heading) => {
      const a = document.createElement("a");
      a.href = `#${heading.id}`;
      a.textContent = heading.textContent || "";
      a.className = heading.tagName === "H3" ? "toc-h3" : "";
      toc.appendChild(a);
    });
  }

  function applyHeadingSearch(query) {
    const links = toc.querySelectorAll("a");
    const q = query.trim().toLowerCase();
    links.forEach((link) => {
      const visible = !q || link.textContent.toLowerCase().includes(q);
      link.classList.toggle("hidden", !visible);
    });
  }

  async function loadGuide() {
    try {
      const res = await fetch(guidePath);
      if (!res.ok) {
        throw new Error(`Unable to fetch file: ${res.status}`);
      }
      const markdown = await res.text();
      markdownContainer.innerHTML = marked.parse(markdown);
      const headings = assignHeadingIds();
      buildToc(headings);
    } catch (error) {
      markdownContainer.innerHTML = `
        <div class="status">
          Could not load <code>${guidePath}</code>.<br/>
          Run this file via a local server so browser fetch can read markdown content.
        </div>
      `;
      toc.innerHTML = "<p class='status'>TOC unavailable.</p>";
      console.error(error);
    }
  }

  searchInput.addEventListener("input", (event) => {
    applyHeadingSearch(event.target.value);
  });

  loadGuide();
</script>
</body>
</html>
